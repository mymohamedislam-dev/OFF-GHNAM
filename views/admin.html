<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OFF-GHANEM - لوحة التحكم</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="hero">
    <h1>🎛️ لوحة التحكم</h1>
    <p>إدارة التسجيلات من أي جهاز</p>
  </div>

  <div class="admin-container">
    <div id="loginBox" class="form-container" style="max-width: 450px; margin: 0 auto 20px;">
      <h2 style="text-align:center; margin-bottom: 15px;">🔐 دخول لوحة التحكم</h2>
      <div class="form-group">
        <label for="adminPassword">كلمة المرور *</label>
        <input type="password" id="adminPassword" placeholder="أدخل كلمة المرور">
      </div>
      <button type="button" class="btn-primary" onclick="verifyPassword()">دخول</button>
      <p id="loginMessage" style="text-align:center; margin-top:10px; color:#8b1e2d;"></p>
    </div>

    <div id="adminPanel" style="display:none;">
      <div style="margin-bottom: 20px; text-align: center;">
        <h2 style="color: #000; margin-bottom: 10px;">التسجيلات</h2>
        <p style="color: #666;">تظهر التسجيلات من جميع الأجهزة</p>
      </div>

      <div id="registrationsList" class="registrations-list">
        <div class="empty-state">
          <h2>جاري التحميل...</h2>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function verifyPassword() {
      const password = document.getElementById('adminPassword').value;
      const message = document.getElementById('loginMessage');

      try {
        const response = await fetch('/api/admin/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        if (!response.ok) {
          message.textContent = 'كلمة المرور غير صحيحة';
          return;
        }

        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadRegistrations();
      } catch (error) {
        message.textContent = 'خطأ في الاتصال بالخادم';
      }
    }

    async function loadRegistrations() {
      try {
        const response = await fetch('/api/registrations');
        const registrations = await response.json();
        displayRegistrations(registrations);
      } catch (error) {
        console.error('Error loading registrations:', error);
        document.getElementById('registrationsList').innerHTML =
          '<div class="empty-state"><h2>خطأ في التحميل</h2></div>';
      }
    }

    function displayRegistrations(registrations) {
      const container = document.getElementById('registrationsList');

      if (registrations.length === 0) {
        container.innerHTML = '<div class="empty-state"><h2>لا توجد تسجيلات حتى الآن</h2></div>';
        return;
      }

      container.innerHTML = registrations.map(reg => `
        <div class="registration-card">
          <h3>${reg.firstName} ${reg.lastName}</h3>

          <div class="registration-info">
            <p><strong>الاسم:</strong> ${reg.firstName} ${reg.lastName}</p>
            <p><strong>الهاتف:</strong> <a href="tel:${reg.phoneNumber}" style="color: #dc143c; text-decoration: none;">${reg.phoneNumber}</a></p>
            <p><strong>التاريخ:</strong> ${new Date(reg.createdAt).toLocaleDateString('ar-SA')}</p>
          </div>

          <span class="status-badge status-${reg.status}">
            ${getStatusText(reg.status)}
          </span>

          ${reg.status === 'pending' ? `
            <div class="button-group">
              <button class="btn-accept" onclick="acceptRegistration(${reg.id})">✓ قبول</button>
            </div>
          ` : ''}
        </div>
      `).join('');
    }

    function getStatusText(status) {
      if (status === 'accepted') {
        return 'مقبول';
      }
      return 'معلق';
    }

    async function acceptRegistration(id) {
      if (confirm('هل تريد قبول هذا التسجيل؟')) {
        try {
          const response = await fetch(`/api/accept/${id}`, { method: 'POST' });
          if (response.ok) {
            loadRegistrations();
            alert('تم قبول التسجيل بنجاح ✓');
          }
        } catch (error) {
          console.error('Error:', error);
        }
      }
    }

    document.getElementById('adminPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        verifyPassword();
      }
    });
  </script>
</body>
</html>
