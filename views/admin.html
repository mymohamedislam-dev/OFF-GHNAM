<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OFF-GHANEM - لوحة التحكم</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="hero">
    <h1>🎛️ لوحة التحكم</h1>
    <p>إدارة التسجيلات</p>
  </div>

  <div class="admin-container">
    <div style="margin-bottom: 20px; text-align: center;">
      <h2 style="color: #000; margin-bottom: 10px;">التسجيلات المعلقة</h2>
      <p style="color: #666;">استعرض وقبل أو ارفض الطلبات</p>
    </div>

    <div id="registrationsList" class="registrations-list">
      <div class="empty-state">
        <h2>جاري التحميل...</h2>
      </div>
    </div>
  </div>

  <script>
    async function loadRegistrations() {
      try {
        const response = await fetch('/api/registrations');
        const registrations = await response.json();
        displayRegistrations(registrations);
      } catch (error) {
        console.error('Error loading registrations:', error);
        document.getElementById('registrationsList').innerHTML = 
          '<div class="empty-state"><h2>خطأ في التحميل</h2></div>';
      }
    }

    function displayRegistrations(registrations) {
      const container = document.getElementById('registrationsList');
      
      if (registrations.length === 0) {
        container.innerHTML = '<div class="empty-state"><h2>لا توجد تسجيلات حتى الآن</h2></div>';
        return;
      }

      container.innerHTML = registrations.map(reg => `
        <div class="registration-card">
          <h3>${reg.firstName} ${reg.lastName}</h3>
          
          <div class="registration-info">
            <p><strong>الاسم:</strong> ${reg.firstName} ${reg.lastName}</p>
            <p><strong>الهاتف:</strong> <a href="tel:${reg.phoneNumber}" style="color: #dc143c; text-decoration: none;">${reg.phoneNumber}</a></p>
            <p><strong>التاريخ:</strong> ${new Date(reg.createdAt).toLocaleDateString('ar-SA')}</p>
          </div>

          <span class="status-badge status-${reg.status}">
            ${getStatusText(reg.status)}
          </span>

          ${reg.status === 'pending' ? `
            <div class="button-group">
              <button class="btn-accept" onclick="acceptRegistration(${reg.id})">✓ قبول</button>
              <button class="btn-reject" onclick="rejectRegistration(${reg.id})">✗ رفض</button>
            </div>
          ` : ''}
        </div>
      `).join('');
    }

    function getStatusText(status) {
      const statusMap = {
        'pending': 'معلق',
        'accepted': 'مقبول',
        'rejected': 'مرفوض'
      };
      return statusMap[status] || status;
    }

    async function acceptRegistration(id) {
      if (confirm('هل تريد قبول هذا التسجيل؟')) {
        try {
          const response = await fetch(`/api/accept/${id}`, { method: 'POST' });
          if (response.ok) {
            loadRegistrations();
            showNotification('تم قبول التسجيل بنجاح ✓');
          }
        } catch (error) {
          console.error('Error:', error);
        }
      }
    }

    async function rejectRegistration(id) {
      if (confirm('هل تريد رفض هذا التسجيل؟')) {
        try {
          const response = await fetch(`/api/reject/${id}`, { method: 'POST' });
          if (response.ok) {
            loadRegistrations();
            showNotification('تم رفض التسجيل ✗');
          }
        } catch (error) {
          console.error('Error:', error);
        }
      }
    }

    function showNotification(message) {
      // يمكن إضافة نظام إشعارات أفضل هنا
      alert(message);
    }

    // تحديث التسجيلات كل 5 ثوان
    loadRegistrations();
    setInterval(loadRegistrations, 5000);
  </script>
</body>
</html>
